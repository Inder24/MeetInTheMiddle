<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Meet Me Halfway POC</title>
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="planner-panel">
        <header class="app-header">
          <div>
            <p class="eyebrow">Grab Maps POC</p>
            <h1>Meet Me Halfway</h1>
          </div>
          <p>Fair meetup picks from live travel time, with just enough chaos for the group chat.</p>
        </header>

        <form id="planner-form" class="planner-form">
          <div class="section-heading">
            <span>1</span>
            <strong>Friends</strong>
          </div>
          <div class="friends-grid" id="friends-grid"></div>

          <div class="section-heading">
            <span>2</span>
            <strong>Plan</strong>
          </div>
          <div class="controls-grid">
            <div class="vibe-control form-field">
              <span class="field-label">Venue vibe</span>
              <input id="category" name="category" type="hidden" value="cafe" />
              <div class="vibe-chips" role="group" aria-label="Venue vibe">
                <button class="vibe-chip is-active" type="button" data-category="cafe">Cafe</button>
                <button class="vibe-chip" type="button" data-category="food">Food</button>
                <button class="vibe-chip" type="button" data-category="mall">Mall</button>
                <button class="vibe-chip" type="button" data-category="park">Park / Nature</button>
                <button class="vibe-chip" type="button" data-category="bar">Bar</button>
                <button class="vibe-chip" type="button" data-category="dessert">Dessert</button>
                <button class="vibe-chip" type="button" data-category="coworking">Coworking</button>
              </div>
            </div>
            <label class="tooltip-field">
              <span class="label-with-help">
                Optimize
                <button class="help-dot" type="button" aria-describedby="optimize-help" aria-label="What does optimize do?">?</button>
              </span>
              <span class="tooltip-card" id="optimize-help" role="tooltip">
                <strong>Most fair:</strong> minimizes the longest trip and imbalance.
                <strong>Fastest:</strong> minimizes total group travel time.
                <strong>Nobody over cap:</strong> penalizes venues above max minutes.
                <strong>Cheapest socially:</strong> minimizes resentment from uneven travel.
              </span>
              <select id="optimizeFor" name="optimizeFor">
                <option value="fair">Most fair</option>
                <option value="fastest">Fastest overall</option>
                <option value="capped">Nobody over cap</option>
                <option value="social">Cheapest socially</option>
              </select>
            </label>
            <label>
              Max minutes
              <input id="capMinutes" name="capMinutes" type="number" min="5" max="90" value="25" />
            </label>
            <label>
              Roast tone
              <select id="tone" name="tone">
                <option value="gentle">Gentle</option>
                <option value="spicy" selected>Spicy</option>
                <option value="unhinged">Unhinged</option>
              </select>
            </label>
          </div>

          <div class="action-row">
            <button class="secondary-action" id="search-all" type="button">Search all origins</button>
            <button class="primary-action" type="submit">Rank meetup spots</button>
          </div>
        </form>
      </section>

      <section class="map-panel">
        <div id="map"></div>
        <div class="map-status" id="map-status">Loading Grab map...</div>
      </section>

      <section class="results-panel">
        <header class="results-header">
          <div>
            <p class="eyebrow">Live ranking</p>
            <h2>Venue board</h2>
          </div>
          <span class="status-pill" id="status-line">Ready</span>
        </header>
        <div class="share-card" id="share-card" hidden></div>
        <div class="results-list" id="results-list"></div>
      </section>
    </main>

    <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
    <script type="module" src="/app.js"></script>
  </body>
</html>
